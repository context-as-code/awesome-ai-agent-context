name: Report a stale entry
description: Flag a dead link, archived repo, renamed repo, or out-of-date description.
title: "[Stale] <repo-owner>/<repo-name>"
labels: ["stale"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. This template is for flagging entries that have drifted since admission — dead links, archived repos, renamed repos, or descriptions that no longer reflect what the repo ships.

  - type: input
    id: entry-name
    attributes:
      label: Entry name
      description: The name as it appears in the directory.
      placeholder: owner/repo
    validations:
      required: true

  - type: input
    id: section
    attributes:
      label: Section
      description: Which shape-category section is the entry under?
      placeholder: Skill collections
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue type
      options:
        - Dead link
        - Repository archived
        - Repository renamed / relocated
        - Description out of date
        - Other
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: What's wrong, and where it should point now (if applicable). For renames, please include the new URL.
    validations:
      required: true
